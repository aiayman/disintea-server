events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=ws:10m     rate=5r/s;
    limit_req_status 429;

    # Security headers applied globally
    add_header X-Frame-Options          "DENY"                            always;
    add_header X-Content-Type-Options   "nosniff"                         always;
    add_header X-XSS-Protection         "1; mode=block"                   always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "microphone=(*), camera=()"       always;
    # Allow WebRTC mixed-content from the same origin
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; media-src *; connect-src 'self' wss: https:;" always;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/wasm image/svg+xml;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host:8443$request_uri;
    }

    # ── HTTPS ─────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # Mozilla Intermediate TLS
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout       1d;
        ssl_session_cache         shared:SSL:10m;

        # ── Static web app (React SPA) ──────────────────────────────────
        root /var/www/disintea;
        index index.html;

        location / {
            limit_req zone=general burst=40 nodelay;
            try_files $uri $uri/ /index.html;
        }

        # ── WebSocket signaling ─────────────────────────────────────────
        location /ws {
            limit_req zone=ws burst=10 nodelay;

            proxy_pass         http://disintea-server:8080;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── TURN credential endpoint (browser clients) ──────────────────
        location /turn-credentials {
            limit_req zone=general burst=10 nodelay;
            proxy_pass http://disintea-server:8080;
            proxy_set_header Host $host;
        }

        # ── Health check ────────────────────────────────────────────────
        location /health {
            proxy_pass http://disintea-server:8080;
            access_log off;
        }
    }
}
