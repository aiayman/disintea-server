events { worker_connections 1024; }

http {
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m  rate=20r/s;
    limit_req_zone $binary_remote_addr zone=ws:10m   rate=5r/s;
    limit_req_status 429;

    add_header X-Frame-Options        "DENY"    always;
    add_header X-Content-Type-Options "nosniff" always;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── HTTP: close immediately (no redirect, just reject) ───────────────
    server {
        listen 80;
        server_name _;
        return 444;
    }

    # ── HTTPS: API + WebSocket only, no web UI ───────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;

        # Block everything by default — no web UI
        location / {
            return 403;
        }

        # WebSocket signaling (Tauri app only)
        location /ws {
            limit_req zone=ws burst=10 nodelay;
            proxy_pass         http://disintea-server:8080;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # TURN credentials (Tauri app only)
        location /turn-credentials {
            limit_req zone=api burst=5 nodelay;
            proxy_pass http://disintea-server:8080;
            proxy_set_header Host      $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check (internal monitoring)
        location /health {
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
            proxy_pass http://disintea-server:8080;
        }
    }
}
