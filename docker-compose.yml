services:
  disintea-server:
    image: disintea-server:latest
    build: .
    expose:
      - "8080"
    restart: always
    env_file: .env
    environment:
      - BIND_ADDR=0.0.0.0:8080
      - RUST_LOG=disintea_server=info

    # ── Security hardening (mirrors chipnuts) ──
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true

    # /tmp needed by tokio async runtime
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=64m

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

    # Resource limits — signaling is CPU-light
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

    networks:
      - disintea_network

  nginx:
    image: nginx:alpine
    ports:
      - "8443:443"   # Port 8443 — avoids conflict with chipnuts on 443
      - "8080:80"    # HTTP on 8080 → redirects to 8443
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro           # TLS certificates
      - ./web-dist:/var/www/disintea:ro       # Static web app
      - ./logs/nginx:/var/log/nginx
    depends_on:
      disintea-server:
        condition: service_healthy
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE   # nginx needs to bind <1024 ports inside container
    networks:
      - disintea_network

networks:
  disintea_network:
    driver: bridge
